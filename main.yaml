esphome:
  name: xiao
  comment: 'Snippet generated by ESPHome Designer'
  on_boot:
    priority: 300
    then:
      - delay: 2s
      - script.execute: manage_run_and_sleep

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret hass_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Xaio-7-5-Epaper Fallback Hotspot"
    password: "6vURgr18Ncp8"

captive_portal:

# Include the designer-generated snippet: https://github.com/koosoli/ESPHomeDesigner hosted at https://home.joesturge.com/esphome-designer
<<: !include designer.yaml