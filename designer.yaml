script:

  - id: manage_run_and_sleep
    mode: restart
    then:
      - logger.log: "Waiting for sync..."
      - wait_until:
          condition:
            lambda: 'return id(ha_time).now().is_valid() && api_is_connected();'
          timeout: 120s
      - delay: 5s
      - lambda: |-
          int interval = id(page_refresh_default_s);
          id(page_refresh_current_s) = interval;
      - component.update: epaper_display
      - delay: !lambda 'return id(page_refresh_current_s) * 1000;'
      - script.execute: manage_run_and_sleep
display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin: GPIO3
    dc_pin: GPIO5
    reset_pin: GPIO2
    busy_pin:
      number: GPIO4
      inverted: true
    model: "7.50inv2p"
    rotation: 0
    update_interval: never
    full_update_every: 30

    lambda: |-
      const auto COLOR_WHITE = Color(0, 0, 0); // Inverted for e-ink
      const auto COLOR_BLACK = Color(255, 255, 255); // Inverted for e-ink
      const auto COLOR_RED = Color(255, 0, 0);
      const auto COLOR_GREEN = Color(0, 255, 0);
      const auto COLOR_BLUE = Color(0, 0, 255);
      const auto COLOR_YELLOW = Color(255, 255, 0);
      const auto COLOR_ORANGE = Color(255, 165, 0);
      auto color_off = COLOR_WHITE;
      auto color_on = COLOR_BLACK;

      // Helper to print text with word-wrap at widget boundary
      auto print_wrapped_text = [&](int x, int y, int max_w, int line_h, esphome::font::Font *font, Color color, TextAlign align, const char* text) {
        if (!text || max_w <= 0) return;
        int cx = x;
        int cy = y;
        std::string line;
        std::string word;
        const char* p = text;
        while (*p) {
          // SANITIZATION: Treat newlines, carriage returns, and tabs as spaces for flow
          bool is_space = (*p == ' ' || *p == '\n' || *p == '\r' || *p == '\t');
          if (is_space) {
            if (!word.empty()) {
              int ww, wh, wbl, wx;
              font->measure(word.c_str(), &ww, &wx, &wbl, &wh);
              int lw = 0, lx;
              if (!line.empty()) { font->measure(line.c_str(), &lw, &lx, &wbl, &wh); int sw, sx, sbl, sh; font->measure(" ", &sw, &sx, &sbl, &sh); lw += sw; }
              if (lw + ww > max_w && !line.empty()) {
                it.print(cx, cy, font, color, align, line.c_str());
                cy += line_h;
                line = word;
              } else {
                if (!line.empty()) line += " ";
                line += word;
              }
              word.clear();
            }
          } else {
            word += *p;
          }
          p++;
        }
        if (!word.empty()) {
          int ww, wh, wbl, wx;
          font->measure(word.c_str(), &ww, &wx, &wbl, &wh);
          int lw = 0, lx;
          if (!line.empty()) { font->measure(line.c_str(), &lw, &lx, &wbl, &wh); int sw, sx, sbl, sh; font->measure(" ", &sw, &sx, &sbl, &sh); lw += sw; }
          if (lw + ww > max_w && !line.empty()) {
            it.print(cx, cy, font, color, align, line.c_str());
            cy += line_h;
            line = word;
          } else {
            if (!line.empty()) line += " ";
            line += word;
          }
        }
        if (!line.empty()) {
          it.print(cx, cy, font, color, align, line.c_str());
        }
      };

      // Helper to apply a simple grey dither mask for e-paper (checkerboard)
      auto apply_grey_dither_mask = [&](int x_start, int y_start, int w, int h) {
        for (int y = y_start; y < y_start + h; y++) {
          for (int x = x_start; x < x_start + w; x++) {
            if ((x + y) % 2 == 0) it.draw_pixel_at(x, y, COLOR_WHITE);
            else it.draw_pixel_at(x, y, COLOR_BLACK);
          }
        }
      };

      // Helper to apply grey dither to text (subtractive - erases every other black pixel)
      auto apply_grey_dither_to_text = [&](int x_start, int y_start, int w, int h) {
        for (int y = y_start; y < y_start + h; y++) {
          for (int x = x_start; x < x_start + w; x++) {
            if ((x + y) % 2 == 0) it.draw_pixel_at(x, y, COLOR_WHITE);
          }
        }
      };
      int currentPage = id(display_page);
      // ═══════════════════════════════════════════════════════════════
      // ▸ PAGE: Page 1
      // ═══════════════════════════════════════════════════════════════
      if (currentPage == 0) {
        // page:name "Page 1"
        // page:dark_mode "inherit"
        // page:refresh_type "interval"
        // page:refresh_time ""
        // page:visible_from ""
        // page:visible_to ""
        // Clear screen for this page
        it.fill(COLOR_WHITE);
        color_off = COLOR_WHITE;
        color_on = COLOR_BLACK;
        // widget:qr_code id:w_mmwn24srcs6eh type:qr_code x:699 y:0 w:101 h:100 value:"http://hass.home.arpa:8123" _calculatedScale:4
                it.qr_code(699, 0, id(qr_w_mmwn24srcs6eh), color_on, 3);
        // ────────────────────────────────────────
        // widget:label id:w_mmwn4axwnrh63 type:label x:699 y:100 w:101 h:41 text:"Home Assistant" font_size:16 text_align:"TOP_CENTER"
                it.printf(750, 100, id(font_roboto_400_16), color_on, TextAlign::TOP_CENTER, "Home ");
                it.printf(750, 120, id(font_roboto_400_16), color_on, TextAlign::TOP_CENTER, "Assistant");
        // ────────────────────────────────────────
        // widget:qr_code id:w_mmwn9anmfsvfx type:qr_code x:699 y:360 w:100 h:100 value:"WIFI:T:WPA;S:nippon-fly-killer;P:$corpion2000;H:true;;" _calculatedScale:3
                it.qr_code(699, 360, id(qr_w_mmwn9anmfsvfx), color_on, 3);
        // ────────────────────────────────────────
        // widget:label id:w_mmwnb1vsjcere type:label x:700 y:458 w:100 h:22 text:"WiFi" font_size:16 text_align:"TOP_CENTER"
                it.printf(750, 458, id(font_roboto_400_16), color_on, TextAlign::TOP_CENTER, "WiFi");
        // ────────────────────────────────────────
        // widget:wifi_signal id:w_mmwnivbvewo1t type:wifi_signal x:43 y:10 w:55 h:16 size:17 font_size:14
                {
                  const char* wifi_icon = "\U000F092B"; // Default: wifi-strength-alert-outline
                  if (id(wifi_signal_dbm).has_state()) {
                    float signal = id(wifi_signal_dbm).state;
                    if (std::isnan(signal)) signal = -100;
                    if (signal >= -50) wifi_icon = "\U000F0928";      // wifi-strength-4 (Excellent)
                    else if (signal >= -60) wifi_icon = "\U000F0925"; // wifi-strength-3 (Good)
                    else if (signal >= -75) wifi_icon = "\U000F0922"; // wifi-strength-2 (Fair)
                    else if (signal >= -100) wifi_icon = "\U000F091F"; // wifi-strength-1 (Weak)
                    else wifi_icon = "\U000F092B";                    // wifi-strength-alert-outline
                  }
                  it.printf(43 + 55 / 2, 10 + (16 - 33) / 2, id(font_material_design_icons_400_17), color_on, TextAlign::TOP_CENTER, "%s", wifi_icon);
                  if (id(wifi_signal_dbm).has_state()) {
                    it.printf(43 + 55 / 2, 10 + (16 - 33) / 2 + 17 + 2, id(font_roboto_400_14), color_on, TextAlign::TOP_CENTER, "%.0fdB", id(wifi_signal_dbm).state);
                  }
                }
        // ────────────────────────────────────────
        // widget:battery_icon id:w_mmwnjoap1r2jg type:battery_icon x:0 y:5 w:55 h:25 size:17
                {
                  const char* bat_icon = "\U000F0082"; // Default: battery-90
                  float bat_level = 0;
                  it.printf(0 + 55 / 2, 5 + (25 - 33) / 2, id(font_material_design_icons_400_17), color_on, TextAlign::TOP_CENTER, "%s", bat_icon);
